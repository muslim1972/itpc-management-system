<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: #0f172a; color: #f8fafc; display: flex;
            align-items: center; justify-content: center; height: 100vh;
            overflow: hidden; text-align: center;
        }
        .container {
            max-width: 500px; padding: 3rem; border-radius: 2rem;
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .icon {
            font-size: 6rem; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        h1 { font-size: 1.8rem; margin: 1rem 0; font-weight: 700; color: #fff; }
        p { color: #94a3b8; font-size: 1rem; line-height: 1.8; margin-bottom: 2.5rem; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.8rem 2.5rem; background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white; text-decoration: none; border-radius: 1rem; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">404</div>
        <h1>عذراً، الصفحة غير موجودة</h1>
        <p>المسار الذي تحاول الوصول إليه غير متاح حالياً في نظام الخدمات.</p>
        <a href="/" class="btn">العودة للرئيسية</a>
    </div>
</body>
</html>
